# CaMa-Flood Configuration File
# This file contains all configuration parameters for running CaMa-Flood simulations

# Base directory of CaMa-Flood installation
base_dir = "./cama_flood"

# Experiment name (used for output directory)
experiment_name = "my_test_simulation"

# Simulation time range
start_year = 1980
end_year = 1981

# Map data configuration
# Path to map tar.gz file (will be extracted to base_dir/map/{map_name}/)
map_tar_gz = "./data/glb_15min.tar.gz"
# map_name is auto-extracted from filename (glb_15min.tar.gz -> glb_15min)

# Runoff data configuration
# Path to runoff tar file (will be extracted to base_dir/inp/{runoff_name}/)
runoff_tar = "./data/E2O_ecmwf.tar"
# runoff_prefix is auto-detected from files in the extracted directory

# Climatology data configuration
# Path to climatology tar/tar.gz file (will be extracted to base_dir/map/data/)
climatology_tar = "./data/climatology_runoff.tar.gz"

# Executable configuration
# Path to compiled CaMa-Flood executable (optional, defaults to base_dir/src/MAIN_cmf)
# executable_path = "./cama_flood/src/MAIN_cmf"

# Compilation configuration
# If True, compile with NetCDF support. If False, compile without NetCDF (binary output only)
compile_with_netcdf = true

# Time resolution parameters
# Main timestep length in seconds (default: 3600 = 1 hour). Must be multiple of 60.
dt = 7200

# Use adaptive time stepping (default: True). If False, uses fixed DT timestep.
ladpstp = true

# Courant coefficient for adaptive timestep calculation (default: 0.7)
# Lower = smaller timesteps (more stable, slower)
pcadp = 0.7

# Input forcing update frequency in hours (default: 24 = daily)
# How often to read new input data
ifrq_inp = 24

# Output data write frequency in hours (default: 24 = daily)
# How often to write averaged output files
ifrq_out = 24

# Output format configuration
# Use NetCDF format for output files (default: False = binary format)
# If True, outputs are .nc files instead of .bin files
# Requires compile_with_netcdf = true
loutcdf = false

# Optional: Override default paths
# dimension_info_file = "./cama_flood/map/glb_15min/diminfo_test-1deg_grid.txt"
# input_matrix_file = "./cama_flood/map/glb_15min/inpmat_test-1deg_grid.bin"

